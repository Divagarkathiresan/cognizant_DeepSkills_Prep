spring.application.name=orm-learn
server.port=8080
# Spring Framework and application log
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate logs for displaying executed SQL, input and output
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql=trace

# Log pattern
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# Save logs in a logs folder
logging.file.name=spring_learn/src/main/java/logs/orm-learn.log

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/springlearn?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=7010812682
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true